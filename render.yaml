services:
  - type: web
    name: syncsphere-backend
    env: node
    rootDir: you_tube2.0-main/server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: "*"
